<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doc Image Stripper</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7f4;
            --panel: #ffffff;
            --ink: #1d2420;
            --muted: #6c756f;
            --line: #d9ded8;
            --accent: #0f7b68;
            --accent-ink: #ffffff;
            --danger: #b4372e;
            --shadow: 0 18px 48px rgba(34, 43, 38, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--ink);
        }

        .shell {
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        header {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.74);
        }

        .brand {
            font-size: 18px;
            font-weight: 700;
        }

        .state {
            min-width: 108px;
            text-align: right;
            color: var(--muted);
            font-size: 14px;
        }

        main {
            display: grid;
            place-items: center;
            padding: 32px;
        }

        .uploader {
            width: min(720px, 100%);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .drop-zone {
            min-height: 340px;
            display: grid;
            place-items: center;
            padding: 40px 28px;
            border: 2px dashed #b9c2bb;
            margin: 18px;
            border-radius: 8px;
            background: #fbfcfa;
            cursor: pointer;
            transition: border-color 0.16s ease, background-color 0.16s ease, transform 0.16s ease;
        }

        .drop-zone:focus-visible {
            outline: 3px solid rgba(15, 123, 104, 0.24);
            outline-offset: 2px;
        }

        .drop-zone.is-over {
            border-color: var(--accent);
            background: #eef8f4;
            transform: translateY(-1px);
        }

        .drop-zone.is-processing {
            border-color: var(--accent);
            background: #f1faf7;
            cursor: wait;
        }

        .drop-content {
            width: min(420px, 100%);
            text-align: center;
        }

        .file-hero {
            position: relative;
            width: 210px;
            height: 130px;
            margin: 0 auto 18px;
        }

        .file-card {
            position: absolute;
            top: 16px;
            width: 92px;
            height: 116px;
            display: grid;
            place-items: center;
            border: 2px solid currentColor;
            border-radius: 8px;
            background: #ffffff;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 0;
            box-shadow: 0 18px 26px rgba(29, 36, 32, 0.16);
        }

        .file-card::after {
            content: "";
            position: absolute;
            right: -2px;
            top: -2px;
            width: 26px;
            height: 26px;
            border-left: 2px solid currentColor;
            border-bottom: 2px solid currentColor;
            border-radius: 0 6px 0 6px;
            background: currentColor;
            opacity: 0.15;
        }

        .file-card.pdf {
            left: 24px;
            color: #c9483d;
            transform: rotate(-30deg);
        }

        .file-card.doc {
            right: 24px;
            color: var(--accent);
            transform: rotate(30deg);
        }

        .file-card span {
            transform: translateY(6px);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 30px;
            line-height: 1.18;
            letter-spacing: 0;
        }

        .hint {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.55;
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .placeholder-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin: 0 0 20px;
            text-align: left;
        }

        .placeholder-field {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .placeholder-field input {
            width: 100%;
            height: 40px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 0 12px;
            color: var(--ink);
            font: inherit;
            background: #ffffff;
        }

        .placeholder-field input:focus {
            outline: 3px solid rgba(15, 123, 104, 0.18);
            border-color: var(--accent);
        }

        button {
            height: 42px;
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 0 18px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .primary {
            background: var(--accent);
            color: var(--accent-ink);
        }

        .secondary {
            background: #ffffff;
            color: var(--ink);
            border-color: var(--line);
        }

        button:disabled {
            opacity: 0.58;
            cursor: default;
        }

        .info-bar {
            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 0 22px 18px;
            color: var(--muted);
            font-size: 14px;
        }

        .filename {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .message {
            text-align: right;
            color: var(--muted);
        }

        .message.error {
            color: var(--danger);
        }

        .message.success {
            color: var(--accent);
            font-weight: 700;
        }

        input[type="file"] {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 620px) {
            header {
                padding: 0 18px;
            }

            main {
                padding: 18px;
            }

            .drop-zone {
                min-height: 300px;
                padding: 28px 18px;
                margin: 12px;
            }

            .file-hero {
                width: 188px;
                height: 118px;
                margin-bottom: 16px;
            }

            .file-card {
                width: 82px;
                height: 104px;
                font-size: 18px;
            }

            .file-card.pdf {
                left: 22px;
            }

            .file-card.doc {
                right: 22px;
            }

            h1 {
                font-size: 25px;
            }

            .info-bar {
                align-items: flex-start;
                flex-direction: column;
            }

            .placeholder-row {
                grid-template-columns: 1fr;
            }

            .message {
                text-align: left;
            }
        }
    </style>
</head>
<body>
<div class="shell">
    <header>
        <div class="brand">Doc Image Stripper</div>
        <div class="state" id="state" aria-live="polite">待上传</div>
    </header>

    <main>
        <section class="uploader" aria-label="PDF / Word 上传">
            <div class="drop-zone" id="dropZone" role="button" tabindex="0">
                <div class="drop-content">
                    <div class="file-hero" aria-label="PDF 和 Word 文件">
                        <div class="file-card pdf"><span>PDF</span></div>
                        <div class="file-card doc"><span>DOC</span></div>
                    </div>
                    <h1>把 PDF / Word 丢进来</h1>
                    <p class="hint">图片会变成 image1、image2，并随处理后的文档一起打包下载。</p>
                    <div class="placeholder-row" aria-label="占位符设置">
                        <label class="placeholder-field" for="placeholderPrefix">
                            <span>左侧占位符</span>
                            <input type="text" id="placeholderPrefix" name="placeholderPrefix" autocomplete="off"
                                   placeholder="例如 -">
                        </label>
                        <label class="placeholder-field" for="placeholderSuffix">
                            <span>右侧占位符</span>
                            <input type="text" id="placeholderSuffix" name="placeholderSuffix" autocomplete="off"
                                   placeholder="例如 !">
                        </label>
                    </div>
                    <div class="button-row">
                        <button class="primary" type="button" id="pickButton">选择文档</button>
                        <button class="secondary" type="button" id="downloadButton" disabled>重新下载</button>
                    </div>
                </div>
            </div>

            <div class="info-bar">
                <div class="filename" id="filename">还没有选择文件</div>
                <div class="message" id="message" aria-live="polite">准备好了</div>
            </div>
        </section>
    </main>
</div>

<input id="fileInput" type="file" accept=".pdf,.doc,.dot,.wbk,.docx,.docm,.dotx,.dotm,.docb">

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const pickButton = document.getElementById('pickButton');
    const downloadButton = document.getElementById('downloadButton');
    const placeholderPrefix = document.getElementById('placeholderPrefix');
    const placeholderSuffix = document.getElementById('placeholderSuffix');
    const filename = document.getElementById('filename');
    const message = document.getElementById('message');
    const state = document.getElementById('state');

    const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:8080' : '';
    const SUPPORTED_EXTENSIONS = ['.pdf', '.doc', '.dot', '.wbk', '.docx', '.docm', '.dotx', '.dotm', '.docb'];

    let lastDownloadUrl = '';
    let lastDownloadName = '';

    const setBusy = (busy) => {
        pickButton.disabled = busy;
        dropZone.classList.toggle('is-processing', busy);
        dropZone.setAttribute('aria-busy', busy ? 'true' : 'false');
        dropZone.style.cursor = busy ? 'wait' : 'pointer';
        if (busy) {
            state.textContent = '处理中';
        }
    };

    const setMessage = (text, isError = false, isSuccess = false) => {
        message.textContent = text;
        message.classList.toggle('error', isError);
        message.classList.toggle('success', isSuccess);
    };

    const openPicker = () => fileInput.click();

    const getDownloadName = (response, fallbackName) => {
        const disposition = response.headers.get('Content-Disposition') || '';
        const encodedMatch = disposition.match(/filename\*=UTF-8''([^;]+)/i);
        if (encodedMatch) {
            return decodeURIComponent(encodedMatch[1]);
        }
        const plainMatch = disposition.match(/filename="?([^";]+)"?/i);
        if (plainMatch) {
            return plainMatch[1];
        }
        const extensionIndex = fallbackName.lastIndexOf('.');
        return (extensionIndex > 0 ? fallbackName.substring(0, extensionIndex) : fallbackName) + '-replaced.zip';
    };

    const triggerDownload = (url, name) => {
        const link = document.createElement('a');
        link.href = url;
        link.download = name;
        document.body.appendChild(link);
        link.click();
        link.remove();
    };

    const upload = async (file) => {
        if (!file) {
            return;
        }
        if (!isSupportedFile(file)) {
            setMessage('只支持 PDF / Word 文件', true);
            return;
        }

        if (lastDownloadUrl) {
            URL.revokeObjectURL(lastDownloadUrl);
            lastDownloadUrl = '';
        }

        filename.textContent = file.name;
        setMessage('上传中，正在处理，请稍等');
        setBusy(true);
        downloadButton.disabled = true;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('placeholderPrefix', placeholderPrefix.value);
        formData.append('placeholderSuffix', placeholderSuffix.value);

        try {
            const response = await fetch(API_BASE + '/api/pdf/replace-images', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || '处理失败');
            }

            const blob = await response.blob();
            lastDownloadName = getDownloadName(response, file.name);
            lastDownloadUrl = URL.createObjectURL(blob);
            triggerDownload(lastDownloadUrl, lastDownloadName);

            state.textContent = '已完成';
            setMessage('处理完成，已下载压缩包 ' + lastDownloadName, false, true);
            downloadButton.disabled = false;
        } catch (error) {
            state.textContent = '失败';
            setMessage(error.message || '处理失败', true);
        } finally {
            setBusy(false);
            fileInput.value = '';
        }
    };

    const hasDraggedFiles = (event) => event.dataTransfer
            && Array.from(event.dataTransfer.types || []).indexOf('Files') >= 0;

    const preventWindowFileDrop = (event) => {
        if (!hasDraggedFiles(event)) {
            return;
        }
        event.preventDefault();
        if (event.dataTransfer) {
            event.dataTransfer.dropEffect = 'copy';
        }
    };

    const isSupportedFile = (file) => file && SUPPORTED_EXTENSIONS
            .some((extension) => file.name.toLowerCase().endsWith(extension));

    const firstSupportedFile = (files) => Array.from(files || [])
            .find(isSupportedFile) || (files && files[0]);

    const showDragReady = (event) => {
        preventWindowFileDrop(event);
        dropZone.classList.add('is-over');
        setMessage('松开鼠标开始上传');
    };

    const isInsideDropZone = (event) => {
        const rect = dropZone.getBoundingClientRect();
        return event.clientX >= rect.left && event.clientX <= rect.right
                && event.clientY >= rect.top && event.clientY <= rect.bottom;
    };

    const hideDragReady = (event) => {
        preventWindowFileDrop(event);
        if (!isInsideDropZone(event)) {
            dropZone.classList.remove('is-over');
        }
    };

    const handleDrop = (event) => {
        preventWindowFileDrop(event);
        dropZone.classList.remove('is-over');
        upload(firstSupportedFile(event.dataTransfer.files));
    };

    document.addEventListener('dragover', preventWindowFileDrop);
    document.addEventListener('drop', preventWindowFileDrop);

    pickButton.addEventListener('click', (event) => {
        event.stopPropagation();
        openPicker();
    });
    dropZone.addEventListener('click', (event) => {
        if (!event.target.closest('button, input, label')) {
            openPicker();
        }
    });
    dropZone.addEventListener('keydown', (event) => {
        if (event.target.closest('button, input')) {
            return;
        }
        if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            openPicker();
        }
    });
    fileInput.addEventListener('change', () => upload(fileInput.files[0]));

    downloadButton.addEventListener('click', (event) => {
        event.stopPropagation();
        if (lastDownloadUrl && lastDownloadName) {
            triggerDownload(lastDownloadUrl, lastDownloadName);
        }
    });

    dropZone.addEventListener('dragenter', showDragReady);
    dropZone.addEventListener('dragover', showDragReady);
    dropZone.addEventListener('dragleave', hideDragReady);
    dropZone.addEventListener('drop', handleDrop);
</script>
</body>
</html>
